services:
  sunlight-visualizer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sunlight-visualizer
    restart: unless-stopped
    ports:
      - "3007:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
